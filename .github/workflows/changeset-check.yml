name: Changeset Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changeset:
    name: Require Changeset
    runs-on: ubuntu-latest
    steps:
      - name: Skip if label present
        id: skip
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          if echo "$LABELS" | grep -q '"skip changeset"'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Changeset check bypassed via 'skip changeset' label."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.skip.outputs.skip == 'false'
        with:
          fetch-depth: 0

      - name: Check for changeset files
        if: steps.skip.outputs.skip == 'false'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Get changesets added in this PR (compared to base branch)
          CHANGESETS=$(git diff --name-only --diff-filter=A "origin/${BASE_REF}...HEAD" -- '.changeset/*.md' | grep -v 'README.md' || true)

          if [ -z "$CHANGESETS" ]; then
            echo "::error::No changeset found. Run 'npx changeset' to add one, or add the 'skip changeset' label to bypass."
            echo ""
            echo "Every PR that changes user-facing behavior needs a changeset."
            echo "Create one with: npx changeset (from the repo root)"
            echo "Or manually create .changeset/<name>.md with:"
            echo ""
            echo '---'
            echo '"web": patch'
            echo '---'
            echo ''
            echo 'Description of the change.'
            exit 1
          fi

          echo "Found changeset(s):"
          echo "$CHANGESETS"
