name: Quality Gates

# Reusable workflow — called by ci.yml (on PR) and cd.yml (on manual dispatch).
# On push to main, cd.yml skips calling this because CI already ran quality
# gates on the same commit before the merge.

on:
  workflow_call:
    inputs:
      web-changed:
        description: 'Whether web/** or package*.json changed (defaults to true when unset)'
        type: boolean
        default: true
      mcp-changed:
        description: 'Whether mcp-server/** changed (defaults to true when unset)'
        type: boolean
        default: true
      engine-changed:
        description: 'Whether engine/** or Cargo.* changed (defaults to true when unset)'
        type: boolean
        default: true
      ci-changed:
        description: 'Whether .github/** changed (defaults to true when unset)'
        type: boolean
        default: true
      can-commit-ratchet:
        description: 'Whether the ratchet job can commit+push (only fires on main branch, requires write perms)'
        type: boolean
        default: true
    outputs:
      lint-result:
        description: 'Outcome of the lint job'
        value: ${{ jobs.lint.result }}
      typecheck-result:
        description: 'Outcome of the typecheck job'
        value: ${{ jobs.typecheck.result }}
      test-web-result:
        description: 'Outcome of the test-web job'
        value: ${{ jobs.test-web.result }}
      test-mcp-result:
        description: 'Outcome of the test-mcp job'
        value: ${{ jobs.test-mcp.result }}
      build-wasm-result:
        description: 'Outcome of the build-wasm job'
        value: ${{ jobs.build-wasm.result }}
      security-result:
        description: 'Outcome of the security job'
        value: ${{ jobs.security.result }}
      coverage-ratchet-result:
        description: 'Outcome of the coverage-ratchet job'
        value: ${{ jobs.coverage-ratchet.result }}

# NOTE: No workflow-level permissions block here. As a reusable workflow,
# permissions are inherited from the caller (ci.yml or cd.yml). Declaring
# permissions here would cause startup_failure if they exceed the caller's
# grants (e.g., ci.yml only grants contents:read for PRs).
# Each job declares its own permissions as needed.

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: --cfg=web_sys_unstable_apis

jobs:
  lint:
    name: Lint
    if: inputs.web-changed || inputs.ci-changed
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - run: npx eslint --max-warnings 0
        working-directory: web

  typecheck:
    name: TypeScript
    if: inputs.web-changed || inputs.ci-changed
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - run: npx tsc --noEmit
        working-directory: web

  test-web:
    name: Web Tests
    if: inputs.web-changed || inputs.ci-changed
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - name: Run tests with coverage
        working-directory: web
        # Uses pool: 'forks' from vitest.config.ts (threads mode breaks vi.mock/Proxy).
        # Coverage thresholds enforced via vitest.config.ts (statements/branches/functions/lines).
        # Timeout safety net: vitest hangs after test completion due to jsdom/coverage
        # open handles (known issue vitest#3077). Exit 124 = timeout killed a hung
        # process after tests already completed successfully — treat as warning, not failure.
        run: |
          set +e
          timeout 600 npx vitest run --coverage 2>&1 | tee /tmp/vitest-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          if [ $EXIT_CODE -eq 124 ]; then
            echo "::warning::vitest process was killed after 600s — likely hung during cleanup (vitest#3077)"
            exit 0
          fi
          # vitest 4.x may exit non-zero due to open handles even when all tests pass.
          # Check if any tests actually failed before propagating the exit code.
          if [ $EXIT_CODE -ne 0 ]; then
            if sed 's/\x1b\[[0-9;]*m//g' /tmp/vitest-output.txt | grep -q "Test Files.*failed"; then
              exit $EXIT_CODE
            else
              echo "::warning::vitest exited with code $EXIT_CODE but no test failures detected — likely open handle issue (vitest#3077)"
              exit 0
            fi
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: web/coverage/
          retention-days: 7

  coverage-ratchet:
    name: Coverage Ratchet
    needs: test-web
    if: (inputs.web-changed || inputs.ci-changed) && needs.test-web.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: coverage-report
          path: web/coverage

      - name: Install jq and bc
        run: sudo apt-get install -y jq bc

      - name: Run coverage ratchet (informational on PRs, commits on main)
        run: bash .claude/skills/testing/scripts/ratchet-coverage.sh web/coverage

      - name: Commit bumped thresholds (main branch only, requires write perms)
        if: github.ref == 'refs/heads/main' && inputs.can-commit-ratchet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet web/vitest.config.ts; then
            echo "No threshold changes to commit."
          else
            git add web/vitest.config.ts
            git commit -m "chore: ratchet coverage thresholds [skip ci]"
            git push
          fi

  test-mcp:
    name: MCP Tests
    if: inputs.mcp-changed || inputs.web-changed || inputs.ci-changed
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - run: npm ci
        working-directory: mcp-server

      - run: npx vitest run
        working-directory: mcp-server

  build-wasm:
    name: WASM Build
    if: inputs.engine-changed || inputs.ci-changed
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine -> target

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.108

      - name: Install wasm-opt (binaryen)
        run: sudo apt-get install -y binaryen

      - name: Build WebGL2 + wasm-bindgen
        working-directory: engine
        run: |
          cargo build --target wasm32-unknown-unknown --release --features webgl2
          wasm-bindgen --target web --out-dir pkg-webgl2 target/wasm32-unknown-unknown/release/forge_engine.wasm

      - name: Build WebGPU + wasm-bindgen
        working-directory: engine
        run: |
          cargo build --target wasm32-unknown-unknown --release --features webgpu
          wasm-bindgen --target web --out-dir pkg-webgpu target/wasm32-unknown-unknown/release/forge_engine.wasm

      - name: Build WebGL2 Runtime (stripped editor)
        working-directory: engine
        run: cargo build --target wasm32-unknown-unknown --release --features webgl2,runtime

      - name: Run wasm-bindgen (WebGL2 Runtime)
        working-directory: engine
        run: wasm-bindgen --target web --out-dir pkg-webgl2-runtime target/wasm32-unknown-unknown/release/forge_engine.wasm

      - name: Build WebGPU Runtime (stripped editor)
        working-directory: engine
        run: cargo build --target wasm32-unknown-unknown --release --features webgpu,runtime

      - name: Run wasm-bindgen (WebGPU Runtime)
        working-directory: engine
        run: wasm-bindgen --target web --out-dir pkg-webgpu-runtime target/wasm32-unknown-unknown/release/forge_engine.wasm

      - name: Run wasm-opt (Oz) on all variants
        working-directory: engine
        run: |
          # -Oz: optimize for size (most aggressive). --enable-bulk-memory: required for
          # wasm-bindgen output which uses bulk memory ops for memory.copy/fill.
          # Runs in-place. Typically reduces binary size by 20-30%.
          for PKG in pkg-webgl2 pkg-webgpu pkg-webgl2-runtime pkg-webgpu-runtime; do
            WASM="$PKG/forge_engine_bg.wasm"
            BEFORE=$(stat -c%s "$WASM")
            wasm-opt -Oz --enable-bulk-memory -o "$WASM" "$WASM"
            AFTER=$(stat -c%s "$WASM")
            BEFORE_MB=$(echo "scale=1; $BEFORE / 1048576" | bc)
            AFTER_MB=$(echo "scale=1; $AFTER / 1048576" | bc)
            echo "$PKG: ${BEFORE_MB} MB -> ${AFTER_MB} MB"
          done

      - name: Check WASM binary sizes
        working-directory: engine
        run: |
          # Size thresholds in bytes (uncompressed .wasm after wasm-opt -Oz).
          # wasm-opt typically reduces ~47 MB editor binaries to ~33-38 MB.
          # Threshold set to 45 MB (post-opt) — increase only when intentionally adding features.
          # CI fails if size exceeds threshold by more than 10%.
          WEBGL2_THRESHOLD=47185920   # 45 MB
          WEBGPU_THRESHOLD=47185920   # 45 MB

          WEBGL2_SIZE=$(stat -c%s pkg-webgl2/forge_engine_bg.wasm)
          WEBGPU_SIZE=$(stat -c%s pkg-webgpu/forge_engine_bg.wasm)

          echo "=== WASM Binary Sizes (post wasm-opt) ==="
          echo "WebGL2: $(numfmt --to=iec-i --suffix=B $WEBGL2_SIZE) ($WEBGL2_SIZE bytes)"
          echo "WebGPU: $(numfmt --to=iec-i --suffix=B $WEBGPU_SIZE) ($WEBGPU_SIZE bytes)"
          echo "=========================================="

          FAILED=0

          WEBGL2_LIMIT=$((WEBGL2_THRESHOLD * 110 / 100))
          if [ "$WEBGL2_SIZE" -gt "$WEBGL2_LIMIT" ]; then
            echo "::error::WebGL2 WASM binary too large: $(numfmt --to=iec-i --suffix=B $WEBGL2_SIZE) exceeds threshold $(numfmt --to=iec-i --suffix=B $WEBGL2_THRESHOLD) by more than 10%"
            FAILED=1
          fi

          WEBGPU_LIMIT=$((WEBGPU_THRESHOLD * 110 / 100))
          if [ "$WEBGPU_SIZE" -gt "$WEBGPU_LIMIT" ]; then
            echo "::error::WebGPU WASM binary too large: $(numfmt --to=iec-i --suffix=B $WEBGPU_SIZE) exceeds threshold $(numfmt --to=iec-i --suffix=B $WEBGPU_THRESHOLD) by more than 10%"
            FAILED=1
          fi

          exit $FAILED

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-binaries
          path: |
            engine/pkg-webgl2/
            engine/pkg-webgpu/
            engine/pkg-webgl2-runtime/
            engine/pkg-webgpu-runtime/
          retention-days: 7

  security:
    name: Rust Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - name: npm audit (web)
        working-directory: web
        run: npm audit --audit-level=critical

      - run: npm ci
        working-directory: mcp-server

      - name: npm audit (mcp-server)
        working-directory: mcp-server
        run: npm audit --audit-level=critical

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine -> target

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: cargo audit (engine)
        working-directory: engine
        run: cargo audit
