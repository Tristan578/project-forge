name: CD

on:
  push:
    branches: [main]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: --cfg=web_sys_unstable_apis

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - run: npx eslint --max-warnings 0
        working-directory: web

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - run: npx tsc --noEmit
        working-directory: web

  test-web:
    name: Web Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - run: npx vitest run
        working-directory: web

  test-mcp:
    name: MCP Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - run: npm ci
        working-directory: mcp-server

      - run: npx vitest run
        working-directory: mcp-server

  build-wasm:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine -> target

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.108

      - name: Build WebGL2
        working-directory: engine
        run: cargo build --target wasm32-unknown-unknown --release --features webgl2

      - name: Build WebGPU
        working-directory: engine
        run: cargo build --target wasm32-unknown-unknown --release --features webgpu

      - name: Run wasm-bindgen (WebGL2)
        working-directory: engine
        run: wasm-bindgen --target web --out-dir pkg-webgl2 target/wasm32-unknown-unknown/release/forge_engine.wasm

      - name: Run wasm-bindgen (WebGPU)
        working-directory: engine
        run: wasm-bindgen --target web --out-dir pkg-webgpu target/wasm32-unknown-unknown/release/forge_engine.wasm

      - name: Build WebGL2 Runtime (stripped editor)
        working-directory: engine
        run: cargo build --target wasm32-unknown-unknown --release --features webgl2,runtime

      - name: Run wasm-bindgen (WebGL2 Runtime)
        working-directory: engine
        run: wasm-bindgen --target web --out-dir pkg-webgl2-runtime target/wasm32-unknown-unknown/release/forge_engine.wasm

      - name: Build WebGPU Runtime (stripped editor)
        working-directory: engine
        run: cargo build --target wasm32-unknown-unknown --release --features webgpu,runtime

      - name: Run wasm-bindgen (WebGPU Runtime)
        working-directory: engine
        run: wasm-bindgen --target web --out-dir pkg-webgpu-runtime target/wasm32-unknown-unknown/release/forge_engine.wasm

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-binaries
          path: |
            engine/pkg-webgl2/
            engine/pkg-webgpu/
            engine/pkg-webgl2-runtime/
            engine/pkg-webgpu-runtime/
          retention-days: 1

  e2e:
    name: E2E (UI)
    runs-on: ubuntu-latest
    needs: [build-wasm]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright chromium
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-binaries
          path: engine/

      - name: Copy WASM to web/public
        run: |
          mkdir -p web/public/engine-pkg-webgl2
          mkdir -p web/public/engine-pkg-webgpu
          mkdir -p web/public/engine-pkg-webgl2-runtime
          mkdir -p web/public/engine-pkg-webgpu-runtime
          cp engine/pkg-webgl2/* web/public/engine-pkg-webgl2/
          cp engine/pkg-webgpu/* web/public/engine-pkg-webgpu/
          cp engine/pkg-webgl2-runtime/* web/public/engine-pkg-webgl2-runtime/ 2>/dev/null || true
          cp engine/pkg-webgpu-runtime/* web/public/engine-pkg-webgpu-runtime/ 2>/dev/null || true

      - name: Run Playwright tests (UI-only, skip @engine)
        working-directory: web
        run: npx playwright test --project=chromium --grep-invert @engine
        env:
          CI: true

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 14

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: web/test-results/
          retention-days: 14

  security:
    name: Rust Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - name: npm audit (web)
        working-directory: web
        run: npm audit --audit-level=high

      - run: npm ci
        working-directory: mcp-server

      - name: npm audit (mcp-server)
        working-directory: mcp-server
        run: npm audit --audit-level=high

  # ---- Deployment ----
  # Deploys to Vercel after all checks pass.
  # Required GitHub Secrets:
  #   VERCEL_TOKEN        — Personal access token from https://vercel.com/account/tokens
  #   VERCEL_ORG_ID       — From .vercel/project.json after `vercel link`
  #   VERCEL_PROJECT_ID   — From .vercel/project.json after `vercel link`
  #   CLERK_PUBLISHABLE_KEY, CLERK_SECRET_KEY — Clerk auth keys
  #   + all other env vars from .env.example
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-web, test-mcp, build-wasm, e2e, security]
    # Only deploy when all secrets are configured
    if: ${{ vars.VERCEL_DEPLOY_ENABLED == 'true' }}
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-binaries
          path: engine/

      - name: Copy WASM to web/public
        run: |
          mkdir -p web/public/engine-pkg-webgl2
          mkdir -p web/public/engine-pkg-webgpu
          mkdir -p web/public/engine-pkg-webgl2-runtime
          mkdir -p web/public/engine-pkg-webgpu-runtime
          cp engine/pkg-webgl2/* web/public/engine-pkg-webgl2/
          cp engine/pkg-webgpu/* web/public/engine-pkg-webgpu/
          cp engine/pkg-webgl2-runtime/* web/public/engine-pkg-webgl2-runtime/ 2>/dev/null || true
          cp engine/pkg-webgpu-runtime/* web/public/engine-pkg-webgpu-runtime/ 2>/dev/null || true

      - name: Pull Vercel environment
        working-directory: web
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build with Vercel
        working-directory: web
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        id: deploy
        working-directory: web
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
          echo "Deployed to: $url"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
