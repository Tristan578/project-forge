name: CD

# Security: Preview URL deployment protection (#7994)
#
# Preview deployments created by this workflow are publicly accessible by
# default. To prevent unauthenticated access to preview URLs (which may
# expose unreleased features or BYOK key flows):
#
#   1. Go to Vercel Dashboard -> spawnforge project -> Settings -> Deployment Protection
#   2. Set "Vercel Authentication" (or "Password Protection") to "All Deployments"
#      so that every preview URL requires SSO / Vercel login before rendering.
#   3. Repeat for spawnforge-staging, spawnforge-docs, and spawnforge-design projects.
#
# This CANNOT be configured via vercel.json or CLI flags -- it must be set in
# the Vercel Dashboard (project settings) or via the REST API:
#   PATCH /v9/projects/{id}?teamId={teamId}
#   Body: { "ssoProtection": { "deploymentType": "preview" } }
#
# Reference: https://vercel.com/docs/security/deployment-protection

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      promote_to_production:
        description: 'Promote staging to production'
        required: false
        type: boolean
        default: false
      rollback_production:
        description: 'Rollback production to a previous deployment URL (leave blank to skip)'
        required: false
        type: string
        default: ''

permissions:
  contents: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: --cfg=web_sys_unstable_apis

jobs:
  # ---- Manual Rollback (workflow_dispatch only, bypasses quality gates) ----
  # Trigger via: gh workflow run cd.yml -f rollback_production=https://prev-deploy.vercel.app
  rollback-production-manual:
    name: Rollback Production (Manual)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event.inputs.rollback_production != '' && github.event.inputs.rollback_production != null }}
    permissions:
      contents: read
      deployments: write
    environment:
      name: production
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm i -g vercel@50.34.3

      - name: Promote previous deployment to production
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          ROLLBACK_URL: ${{ github.event.inputs.rollback_production }}
        run: |
          echo "Rolling back production to: $ROLLBACK_URL"
          vercel promote "$ROLLBACK_URL" --scope "$VERCEL_ORG_ID" --token="$VERCEL_TOKEN"
          echo "Rollback complete. Production now at: $ROLLBACK_URL"

      - name: Notify Slack of manual rollback
        if: ${{ vars.SLACK_WEBHOOK_INCIDENTS != '' }}
        env:
          SLACK_WEBHOOK: ${{ vars.SLACK_WEBHOOK_INCIDENTS }}
          ROLLBACK_URL: ${{ github.event.inputs.rollback_production }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ github.actor }}
        run: |
          payload=$(printf '{"text":"*SpawnForge Production Rollback (Manual)*\n*Triggered by:* %s\n*Promoted URL:* <%s|%s>\n*Workflow run:* <%s|View run>"}' \
            "$ACTOR" "$ROLLBACK_URL" "$ROLLBACK_URL" "$RUN_URL")
          curl --silent --fail -X POST "$SLACK_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$payload" || echo "Slack notification failed (non-fatal)"

  # ---- Quality Gates (must all pass before any deployment) ----

  # Quality gate jobs run on every trigger (push to main and workflow_dispatch).
  # This ensures merges that bypass branch protection are still validated before deploy.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Build @spawnforge/ui
        run: cd packages/ui && npm run build

      - run: npx eslint --max-warnings 0
        working-directory: web

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Build @spawnforge/ui
        run: cd packages/ui && npm run build

      - run: npx tsc --noEmit
        working-directory: web

  test-web:
    name: Web Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Build @spawnforge/ui
        run: cd packages/ui && npm run build

      - name: Run tests
        working-directory: web
        # Timeout safety net: vitest hangs after test completion due to jsdom open
        # handles (known issue vitest#3077). Exit 124 = timeout killed a hung process
        # after tests already completed successfully -- treat as warning, not failure.
        run: |
          set +e
          timeout 600 npx vitest run 2>&1 | tee /tmp/vitest-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          if [ $EXIT_CODE -eq 124 ]; then
            echo "::warning::vitest process was killed after 600s -- likely hung during cleanup (vitest#3077)"
            exit 0
          fi
          # vitest 4.x may exit non-zero due to open handles even when all tests pass.
          # Check if any tests actually failed before propagating the exit code.
          if [ $EXIT_CODE -ne 0 ]; then
            if sed 's/\x1b\[[0-9;]*m//g' /tmp/vitest-output.txt | grep -q "Test Files.*failed"; then
              exit $EXIT_CODE
            else
              echo "::warning::vitest exited with code $EXIT_CODE but no test failures detected -- likely open handle issue (vitest#3077)"
              exit 0
            fi
          fi

  test-mcp:
    name: MCP Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx vitest run
        working-directory: mcp-server

  check-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      engine-changed: ${{ steps.filter.outputs.engine }}
      web-changed: ${{ steps.filter.outputs.web }}
      docs-changed: ${{ steps.filter.outputs.docs-changed }}
      design-changed: ${{ steps.filter.outputs.design-changed }}
      web-changed-files: ${{ steps.filter.outputs.web-changed-files }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full clone required: fetch-depth: 2 caused silent git diff failures
          # on squash merges and rapid pushes where github.event.before was not
          # present in the shallow clone. Empty CHANGED output left both flags
          # false, causing every deploy to be skipped.
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          BEFORE="$BEFORE_SHA"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="HEAD~1"
          fi
          CHANGED=$(git diff --name-only "$BEFORE" HEAD 2>/dev/null || true)

          # Fallback: empty diff (first push, force-push, or unreachable SHA)
          # Default web=true so the deploy pipeline is not silently skipped.
          if [ -z "$CHANGED" ]; then
            echo "::warning::git diff returned empty output -- defaulting web=true engine=false"
            echo "engine=false" >> "$GITHUB_OUTPUT"
            echo "web=true" >> "$GITHUB_OUTPUT"
            echo "docs-changed=false" >> "$GITHUB_OUTPUT"
            echo "design-changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if echo "$CHANGED" | grep -q '^engine/'; then
            echo "engine=true" >> "$GITHUB_OUTPUT"
            echo "Engine files changed -- WASM build required"
          else
            echo "engine=false" >> "$GITHUB_OUTPUT"
            echo "No engine changes -- skipping WASM build"
          fi

          if echo "$CHANGED" | grep -qE '^web/|^package\.json|^\.github/'; then
            echo "web=true" >> "$GITHUB_OUTPUT"
            echo "Web files changed -- deploy required"
          else
            echo "web=false" >> "$GITHUB_OUTPUT"
            echo "No web changes -- skipping deploy"
          fi

          echo "$CHANGED" | grep -qE '^apps/docs/|^mcp-server/manifest/' && echo "docs-changed=true" >> "$GITHUB_OUTPUT" || echo "docs-changed=false" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" | grep -qE '^apps/design/|^packages/ui/' && echo "design-changed=true" >> "$GITHUB_OUTPUT" || echo "design-changed=false" >> "$GITHUB_OUTPUT"

          # Expose changed web file list for schema-change gating
          WEB_FILES=$(echo "$CHANGED" | grep '^web/' || true)
          echo "web-changed-files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$WEB_FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  build-wasm:
    name: WASM Build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [check-changes]
    if: ${{ needs.check-changes.outputs.engine-changed == 'true' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine -> target

      - name: Try downloading WASM from CI (same SHA)
        id: ci-wasm
        uses: actions/download-artifact@v8
        with:
          name: wasm-binaries
          path: engine/
        continue-on-error: true

      - name: Install wasm-bindgen-cli
        if: steps.ci-wasm.outcome != 'success'
        run: cargo install wasm-bindgen-cli --version 0.2.108

      - name: Build WebGL2
        if: steps.ci-wasm.outcome != 'success'
        working-directory: engine
        run: cargo build --target wasm32-unknown-unknown --release --features webgl2

      - name: Build WebGPU
        if: steps.ci-wasm.outcome != 'success'
        working-directory: engine
        run: cargo build --target wasm32-unknown-unknown --release --features webgpu

      - name: Run wasm-bindgen (WebGL2)
        if: steps.ci-wasm.outcome != 'success'
        working-directory: engine
        run: wasm-bindgen --target web --out-dir pkg-webgl2 target/wasm32-unknown-unknown/release/forge_engine.wasm

      - name: Run wasm-bindgen (WebGPU)
        if: steps.ci-wasm.outcome != 'success'
        working-directory: engine
        run: wasm-bindgen --target web --out-dir pkg-webgpu target/wasm32-unknown-unknown/release/forge_engine.wasm

      - name: Build WebGL2 Runtime (stripped editor)
        if: steps.ci-wasm.outcome != 'success'
        working-directory: engine
        run: cargo build --target wasm32-unknown-unknown --release --features webgl2,runtime

      - name: Run wasm-bindgen (WebGL2 Runtime)
        if: steps.ci-wasm.outcome != 'success'
        working-directory: engine
        run: wasm-bindgen --target web --out-dir pkg-webgl2-runtime target/wasm32-unknown-unknown/release/forge_engine.wasm

      - name: Build WebGPU Runtime (stripped editor)
        if: steps.ci-wasm.outcome != 'success'
        working-directory: engine
        run: cargo build --target wasm32-unknown-unknown --release --features webgpu,runtime

      - name: Run wasm-bindgen (WebGPU Runtime)
        if: steps.ci-wasm.outcome != 'success'
        working-directory: engine
        run: wasm-bindgen --target web --out-dir pkg-webgpu-runtime target/wasm32-unknown-unknown/release/forge_engine.wasm

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-binaries
          path: |
            engine/pkg-webgl2/
            engine/pkg-webgpu/
            engine/pkg-webgl2-runtime/
            engine/pkg-webgpu-runtime/
          retention-days: 7

  e2e:
    name: E2E (UI)
    runs-on: ubuntu-latest
    needs: [build-wasm]
    if: ${{ needs.build-wasm.result == 'success' || needs.build-wasm.result == 'skipped' }}
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build @spawnforge/ui
        run: cd packages/ui && npm run build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright chromium
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Download WASM artifacts
        uses: actions/download-artifact@v8
        with:
          name: wasm-binaries
          path: engine/

      - name: Copy WASM to web/public
        run: |
          mkdir -p web/public/engine-pkg-webgl2
          mkdir -p web/public/engine-pkg-webgpu
          mkdir -p web/public/engine-pkg-webgl2-runtime
          mkdir -p web/public/engine-pkg-webgpu-runtime
          cp engine/pkg-webgl2/* web/public/engine-pkg-webgl2/
          cp engine/pkg-webgpu/* web/public/engine-pkg-webgpu/
          cp engine/pkg-webgl2-runtime/* web/public/engine-pkg-webgl2-runtime/ 2>/dev/null || true
          cp engine/pkg-webgpu-runtime/* web/public/engine-pkg-webgpu-runtime/ 2>/dev/null || true

      - name: Run Playwright tests (UI-only, skip @engine)
        working-directory: web
        run: npx playwright test --project=chromium --grep-invert @engine
        env:
          CI: true

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 14

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: web/test-results/
          retention-days: 14

  security:
    name: Rust Security Audit
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: npm audit (web)
        working-directory: web
        run: npm audit --audit-level=critical

      - name: npm audit (mcp-server)
        working-directory: mcp-server
        run: npm audit --audit-level=critical

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine -> target

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: cargo audit (engine)
        working-directory: engine
        run: cargo audit

  # ---- WASM CDN Upload ----
  upload-wasm-cdn:
    name: Upload WASM to R2 CDN
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-wasm]
    if: ${{ vars.R2_CDN_ENABLED == 'true' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install AWS CLI
        run: |
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          sudo ./aws/install --update

      - name: Download WASM artifacts
        uses: actions/download-artifact@v8
        with:
          name: wasm-binaries
          path: engine/

      - name: Prepare WASM source directory
        run: |
          mkdir -p wasm-upload/engine-pkg-webgl2
          mkdir -p wasm-upload/engine-pkg-webgpu
          mkdir -p wasm-upload/engine-pkg-webgl2-runtime
          mkdir -p wasm-upload/engine-pkg-webgpu-runtime
          cp engine/pkg-webgl2/* wasm-upload/engine-pkg-webgl2/
          cp engine/pkg-webgpu/* wasm-upload/engine-pkg-webgpu/
          cp engine/pkg-webgl2-runtime/* wasm-upload/engine-pkg-webgl2-runtime/ 2>/dev/null || true
          cp engine/pkg-webgpu-runtime/* wasm-upload/engine-pkg-webgpu-runtime/ 2>/dev/null || true

      - name: Upload to R2
        run: bash scripts/upload-wasm-to-r2.sh
        env:
          WASM_SOURCE_DIR: wasm-upload
          ENGINE_VERSION: ${{ github.sha }}
          R2_ACCOUNT_ID: ${{ secrets.ASSET_R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.ASSET_R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.ASSET_R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ vars.R2_BUCKET || 'spawnforge-engine' }}

  # ---- Stage 1: Deploy to Staging ----
  # Runs automatically after all quality gates pass on push to main.
  # Staging mirrors production config but receives new code first.
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # check-changes is intentionally NOT in needs -- path detection only gates
    # build-wasm (slow). Every push to main that passes quality gates must deploy.
    needs: [lint, typecheck, test-web, test-mcp, build-wasm, e2e, security, upload-wasm-cdn]
    if: |
      always() &&
      vars.VERCEL_DEPLOY_ENABLED == 'true' &&
      github.event.inputs.promote_to_production != 'true' &&
      needs.lint.result == 'success' &&
      needs.typecheck.result == 'success' &&
      needs.test-web.result == 'success' &&
      (needs.test-mcp.result == 'success' || needs.test-mcp.result == 'skipped') &&
      (needs.security.result == 'success' || needs.security.result == 'skipped') &&
      (needs.build-wasm.result == 'success' || needs.build-wasm.result == 'skipped') &&
      (needs.e2e.result == 'success' || needs.e2e.result == 'skipped') &&
      (needs.upload-wasm-cdn.result == 'success' || needs.upload-wasm-cdn.result == 'skipped')
    permissions:
      contents: read
      deployments: write
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Vercel CLI
        run: npm i -g vercel@50.34.3

      # Run from repo root — Vercel rootDirectory=web handles the subdirectory.
      # Adding working-directory:web here causes web/web path doubling on remote builds.
      - name: Link Vercel project (staging)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_STAGING_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      # Run from repo root — Vercel rootDirectory=web handles the subdirectory.
      # Adding working-directory:web here causes web/web path doubling on remote builds.
      # Remote build avoids `spawn npm ENOENT` bug with `vercel build` on GHA runners.
      # WASM files are served from R2 CDN (engine.spawnforge.ai), not bundled in the deploy.
      # NEXT_PUBLIC_ENGINE_VERSION pins the CDN path to the immutable versioned upload so
      # browsers receive Cache-Control: max-age=31536000, immutable for WASM assets.
      - name: Deploy to staging (remote build)
        id: deploy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_STAGING_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          ENGINE_VERSION: ${{ github.sha }}
        run: |
          url=$(vercel deploy --token="$VERCEL_TOKEN" \
            --build-env NEXT_PUBLIC_ENGINE_VERSION="$ENGINE_VERSION")
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to staging: $url"

      - name: Post-deploy health check (staging)
        id: health-check-staging
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
          HEALTH_CHECK_STABILIZE_S: '10'
          HEALTH_CHECK_RETRIES: '3'
          HEALTH_CHECK_INTERVAL_S: '10'
          # SSO-protected deployments reject bypass tokens. Use vercel curl
          # which authenticates via VERCEL_TOKEN (already used for deploy).
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: bash scripts/post-deploy-health-check.sh "$DEPLOY_URL"

  # ---- Stage 2: Deploy to Production ----
  # Auto-deploys after staging succeeds on push to main.
  # Also triggerable manually via workflow_dispatch with promote_to_production=true.
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # check-changes is required: its outputs.web-changed-files is consumed by the
    # schema migration step. Without this in needs, the expression resolves to
    # empty string and the migration is always skipped.
    needs: [lint, typecheck, test-web, test-mcp, build-wasm, e2e, security, upload-wasm-cdn, deploy-staging, check-changes]
    if: |
      always() &&
      vars.VERCEL_DEPLOY_ENABLED == 'true' &&
      (
        (needs.deploy-staging.result == 'success' && github.event_name == 'push') ||
        (github.event.inputs.promote_to_production == 'true' &&
         needs.lint.result == 'success' &&
         needs.typecheck.result == 'success' &&
         needs.test-web.result == 'success' &&
         needs.test-mcp.result == 'success' &&
         (needs.build-wasm.result == 'success' || needs.build-wasm.result == 'skipped') &&
         (needs.e2e.result == 'success' || needs.e2e.result == 'skipped') &&
         needs.security.result == 'success' &&
         (needs.upload-wasm-cdn.result == 'success' || needs.upload-wasm-cdn.result == 'skipped'))
      )
    permissions:
      contents: read
      deployments: write
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Vercel CLI
        run: npm i -g vercel@50.34.3

      - name: Capture current production URL (last-known-good)
        id: prev-deploy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Retrieve the URL currently aliased to production for rollback purposes.
          # `vercel ls` lists deployments with a stable tabular format; the first
          # READY row is the currently live deployment. We take field 2 (the URL).
          prev_url=$(vercel ls --scope "$VERCEL_ORG_ID" --token="$VERCEL_TOKEN" \
            2>/dev/null \
            | grep -E 'READY' \
            | head -1 \
            | awk '{print $2}' \
            | sed 's|/*$||' || echo "")
          # Ensure the URL has an https:// prefix.
          if [ -n "$prev_url" ] && [ "${prev_url#https://}" = "$prev_url" ]; then
            prev_url="https://${prev_url}"
          fi
          echo "prev_url=${prev_url}" >> "$GITHUB_OUTPUT"
          echo "Last-known-good production URL: ${prev_url:-unknown}"

      # Run from repo root — Vercel rootDirectory=web handles the subdirectory.
      # Adding working-directory:web here causes web/web path doubling on remote builds.
      - name: Pull Vercel environment (production)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Install dependencies for migrations
        run: npm ci

      - name: Run database migrations
        # db:push diffs schema.ts against the live DB and applies only what's
        # needed. This is idempotent — safe to run even if schema was already
        # pushed manually during development. db:migrate (SQL file based) fails
        # when migrations were pre-applied via db:push.
        # DATABASE_URL is supplied as a repository secret (matches the production DB).
        # Only runs when schema files changed — avoids unnecessary DB round-trips on
        # non-schema pushes and prevents accidental destructive schema changes.
        if: contains(needs.check-changes.outputs.web-changed-files, 'db/schema')
        working-directory: web
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx drizzle-kit push

      - name: Apply custom SQL migrations
        # Drizzle can't model partial unique indexes (WHERE predicates).
        # These migrations are idempotent (CREATE ... IF NOT EXISTS or
        # CONCURRENTLY which skips if the index already exists).
        if: contains(needs.check-changes.outputs.web-changed-files, 'db/schema') || contains(needs.check-changes.outputs.web-changed-files, 'drizzle/')
        working-directory: web
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          node --input-type=module -e "
            import { neon } from '@neondatabase/serverless';
            import { readdirSync, readFileSync } from 'fs';
            const sql = neon(process.env.DATABASE_URL);
            const files = readdirSync('drizzle').filter(f => f.match(/^0\d+.*\.sql$/)).sort();
            for (const f of files) {
              console.log('Applying drizzle/' + f);
              const content = readFileSync('drizzle/' + f, 'utf8');
              try { await sql(content); console.log('  OK'); }
              catch(e) {
                const msg = e.message || '';
                const isIdempotent = msg.includes('already exists') || msg.includes('duplicate key') || msg.includes('relation') && msg.includes('already');
                if (isIdempotent) { console.log('  Skipped (idempotent):', msg); }
                else { console.error('  FAILED:', msg); process.exitCode = 1; }
              }
            }
          "

      # Run from repo root — Vercel rootDirectory=web handles the subdirectory.
      # Adding working-directory:web here causes web/web path doubling on remote builds.
      # Remote build avoids `spawn npm ENOENT` bug with `vercel build` on GHA runners.
      # WASM files are served from R2 CDN (engine.spawnforge.ai), not bundled in the deploy.
      # NEXT_PUBLIC_ENGINE_VERSION pins the CDN path to the immutable versioned upload so
      # browsers receive Cache-Control: max-age=31536000, immutable for WASM assets.
      - name: Deploy to production (remote build)
        id: deploy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          ENGINE_VERSION: ${{ github.sha }}
        run: |
          url=$(vercel deploy --prod --token="$VERCEL_TOKEN" \
            --build-env NEXT_PUBLIC_ENGINE_VERSION="$ENGINE_VERSION")
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to production: $url"

      - name: Post-deploy health check (production)
        id: health-check-production
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
          HEALTH_CHECK_STABILIZE_S: '10'
          HEALTH_CHECK_RETRIES: '3'
          HEALTH_CHECK_INTERVAL_S: '10'
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: bash scripts/post-deploy-health-check.sh "$DEPLOY_URL"

      - name: Install Playwright for smoke tests
        if: ${{ success() }}
        run: |
          npm ci
          cd web && npx playwright install --with-deps chromium

      - name: Run production smoke tests
        if: ${{ success() }}
        id: smoke-tests
        working-directory: web
        env:
          PRODUCTION_URL: https://www.spawnforge.ai
        # Use dedicated smoke config — no local webServer, hits live URL directly
        run: npx playwright test --config playwright.smoke.config.ts --project=chromium

      - name: Rollback production on health check or smoke test failure
        if: ${{ failure() && (steps.health-check-production.outcome == 'failure' || steps.smoke-tests.outcome == 'failure') && steps.prev-deploy.outputs.prev_url != '' }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PREV_URL: ${{ steps.prev-deploy.outputs.prev_url }}
          NEW_URL: ${{ steps.deploy.outputs.url }}
        run: |
          echo "::error::Health check failed -- rolling back production to $PREV_URL"
          vercel promote "$PREV_URL" --scope "$VERCEL_ORG_ID" --token="$VERCEL_TOKEN"
          echo "Rollback complete. Production restored to: $PREV_URL"

      - name: Notify Slack of automatic rollback
        if: ${{ failure() && (steps.health-check-production.outcome == 'failure' || steps.smoke-tests.outcome == 'failure') && steps.prev-deploy.outputs.prev_url != '' && vars.SLACK_WEBHOOK_INCIDENTS != '' }}
        env:
          SLACK_WEBHOOK: ${{ vars.SLACK_WEBHOOK_INCIDENTS }}
          PREV_URL: ${{ steps.prev-deploy.outputs.prev_url }}
          NEW_URL: ${{ steps.deploy.outputs.url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          short_sha="${COMMIT_SHA:0:8}"
          payload=$(printf '{"text":"*SpawnForge Production Auto-Rollback*\n:rotating_light: Health check failed for commit `%s`.\n*Failed deployment:* <%s|%s>\n*Rolled back to:* <%s|%s>\n*Workflow run:* <%s|View run>"}' \
            "$short_sha" "$NEW_URL" "$NEW_URL" "$PREV_URL" "$PREV_URL" "$RUN_URL")
          curl --silent --fail -X POST "$SLACK_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$payload" || echo "Slack notification failed (non-fatal)"


  # ---- Docs Site Deploy ----
  # Deploys apps/docs to the Vercel docs project when docs or MCP manifest changed.
  # Independent of the main web deploy — docs can ship without a full Vercel web build.
  deploy-docs:
    name: Deploy Docs
    needs: [check-changes, lint, typecheck]
    if: (needs.check-changes.outputs.docs-changed == 'true' || github.event_name == 'workflow_dispatch') && needs.lint.result != 'failure' && needs.typecheck.result != 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Build @spawnforge/ui
        run: cd packages/ui && npm run build

      - name: Install Vercel CLI
        run: npm i -g vercel@50.34.3

      # Run from repo root — Vercel rootDirectory=apps/docs handles the subdirectory.
      # Same pattern as the main web deploy. Do NOT cd into apps/docs — that causes
      # the remote build to only receive the subdirectory, breaking install commands
      # that reference the monorepo root (packages/ui build).
      - name: Pull Vercel environment (docs)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_DOCS_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Deploy docs to production
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_DOCS_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prod --archive=tgz --token="$VERCEL_TOKEN"

  # ---- Design Workbench Deploy ----
  # Deploys apps/design (Storybook) to the Vercel design project when UI or design files changed.
  deploy-design:
    name: Deploy Design Workbench
    needs: [check-changes, lint, typecheck]
    if: (needs.check-changes.outputs.design-changed == 'true' || github.event_name == 'workflow_dispatch') && needs.lint.result != 'failure' && needs.typecheck.result != 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Build @spawnforge/ui
        run: cd packages/ui && npm run build

      - name: Install Vercel CLI
        run: npm i -g vercel@50.34.3

      # Run from repo root — Vercel rootDirectory=apps/design handles the subdirectory.
      # Same pattern as the main web deploy. Do NOT cd into apps/design — that causes
      # the remote build to only receive the subdirectory, breaking install commands
      # that reference the monorepo root (packages/ui build).
      - name: Pull Vercel environment (design)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_DESIGN_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Deploy design workbench to production
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_DESIGN_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prod --archive=tgz --token="$VERCEL_TOKEN"
