name: Coverage Ratchet

# Standalone workflow for committing bumped coverage thresholds on main.
# quality-gates.yml cannot push because reusable workflows inherit the
# caller's permissions (ci.yml → contents: read). This workflow runs
# independently with contents: write so the ratchet script can commit.

on:
  push:
    branches: [main]
    paths:
      - 'web/src/**'
      - 'web/vitest.config.ts'
      - 'web/vitest.config.node.ts'
      - 'web/vitest.config.jsdom.ts'
      - 'web/package.json'

permissions:
  contents: write

concurrency:
  # Stable group key — serializes ratchet runs on main to prevent push conflicts
  group: coverage-ratchet-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ratchet:
    name: Ratchet Coverage Thresholds
    # Skip ratchet commits from github-actions[bot] to prevent retrigger loops
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        working-directory: web
        id: vitest
        run: |
          npx vitest run --coverage --coverage.reporter=json-summary --pool=threads
        continue-on-error: true

      - name: Check vitest exit
        if: steps.vitest.outcome == 'failure'
        run: echo "::warning::vitest exited non-zero — coverage may be incomplete"

      - name: Run ratchet script
        run: bash .claude/skills/testing/scripts/ratchet-coverage.sh web/coverage

      - name: Commit bumped thresholds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet web/vitest.config.ts; then
            echo "No threshold changes to commit."
          else
            git add web/vitest.config.ts
            git commit -m "chore: ratchet coverage thresholds [skip ci]"
            git push
          fi
