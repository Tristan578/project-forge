name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Quality Gates (reusable workflow shared with CD) ----
  quality-gates:
    name: Quality Gates
    uses: ./.github/workflows/quality-gates.yml

  # ---- CI-only checks ----

  command-parity:
    name: MCP Command Parity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Verify all MCP commands have handlers
        working-directory: web
        run: node scripts/check-command-parity.js

  build-nextjs:
    name: Next.js Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - run: npm run build
        working-directory: web

      - name: Check JS bundle size
        working-directory: web
        run: node scripts/check-bundle-size.js

  # Engine-dependent E2E tests (@engine) require WASM + GPU which CI runners lack.
  # Only UI-only E2E tests (@ui) run in CI — they test React shell without WASM.
  test-e2e-ui:
    name: E2E UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run UI-only E2E tests
        working-directory: web
        run: npx playwright test --grep @ui --project=chromium
