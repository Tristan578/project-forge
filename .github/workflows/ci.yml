name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: --cfg=web_sys_unstable_apis

jobs:
  # Detect which paths changed so downstream jobs can skip when irrelevant.
  # This job always runs -- it is the lightweight "at least one job ran" check
  # that prevents PRs from being stuck without a status.
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      web: ${{ steps.filter.outputs.web }}
      mcp: ${{ steps.filter.outputs.mcp }}
      engine: ${{ steps.filter.outputs.engine }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'web/**'
              - 'package*.json'
            mcp:
              - 'mcp-server/**'
            engine:
              - 'engine/**'
              - '.transform-gizmo-fork/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            ci:
              - '.github/**'

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - run: npx eslint --max-warnings 0
        working-directory: web

  typecheck:
    name: TypeScript
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - run: npx tsc --noEmit
        working-directory: web

  test-web:
    name: Web Tests
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - name: Run tests with coverage
        working-directory: web
        # Uses pool: 'forks' from vitest.config.ts (threads mode breaks vi.mock/Proxy).
        # Coverage thresholds enforced via vitest.config.ts (statements/branches/functions/lines).
        # Timeout safety net: vitest hangs after test completion due to jsdom/coverage
        # open handles (known issue vitest#3077). Exit 124 = timeout killed a hung
        # process after tests already completed successfully -- treat as warning, not failure.
        run: |
          set +e
          timeout 600 npx vitest run --coverage 2>&1 | tee /tmp/vitest-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          if [ $EXIT_CODE -eq 124 ]; then
            echo "::warning::vitest process was killed after 600s -- likely hung during cleanup (vitest#3077)"
            exit 0
          fi
          # vitest 4.x may exit non-zero due to open handles even when all tests pass.
          # Check if any tests actually failed before propagating the exit code.
          if [ $EXIT_CODE -ne 0 ]; then
            if grep -q "failed" /tmp/vitest-output.txt; then
              exit $EXIT_CODE
            else
              echo "::warning::vitest exited with code $EXIT_CODE but no test failures detected -- likely open handle issue (vitest#3077)"
              exit 0
            fi
          fi

  test-mcp:
    name: MCP Tests
    needs: changes
    if: needs.changes.outputs.mcp == 'true' || needs.changes.outputs.web == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - run: npm ci
        working-directory: mcp-server

      - run: npx vitest run
        working-directory: mcp-server

  build-wasm:
    name: WASM Build
    needs: changes
    if: needs.changes.outputs.engine == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine -> target

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.108

      - name: Build WebGL2
        working-directory: engine
        run: cargo build --target wasm32-unknown-unknown --release --features webgl2

      - name: Build WebGPU
        working-directory: engine
        run: cargo build --target wasm32-unknown-unknown --release --features webgpu

      - name: Run wasm-bindgen (WebGL2)
        working-directory: engine
        run: wasm-bindgen --target web --out-dir pkg-webgl2 target/wasm32-unknown-unknown/release/forge_engine.wasm

      - name: Run wasm-bindgen (WebGPU)
        working-directory: engine
        run: wasm-bindgen --target web --out-dir pkg-webgpu target/wasm32-unknown-unknown/release/forge_engine.wasm

      - name: Check WASM binary sizes
        working-directory: engine
        run: |
          # Size thresholds in bytes (uncompressed .wasm after wasm-bindgen)
          # Current sizes: ~47 MB each. Increase when intentionally adding features.
          # CI fails if size exceeds threshold by more than 10%.
          WEBGL2_THRESHOLD=52428800   # 50 MB
          WEBGPU_THRESHOLD=52428800   # 50 MB

          WEBGL2_SIZE=$(stat -c%s pkg-webgl2/forge_engine_bg.wasm)
          WEBGPU_SIZE=$(stat -c%s pkg-webgpu/forge_engine_bg.wasm)

          echo "=== WASM Binary Sizes ==="
          echo "WebGL2: $(numfmt --to=iec-i --suffix=B $WEBGL2_SIZE) ($WEBGL2_SIZE bytes)"
          echo "WebGPU: $(numfmt --to=iec-i --suffix=B $WEBGPU_SIZE) ($WEBGPU_SIZE bytes)"
          echo "========================="

          FAILED=0

          WEBGL2_LIMIT=$((WEBGL2_THRESHOLD * 110 / 100))
          if [ "$WEBGL2_SIZE" -gt "$WEBGL2_LIMIT" ]; then
            echo "::error::WebGL2 WASM binary too large: $(numfmt --to=iec-i --suffix=B $WEBGL2_SIZE) exceeds threshold $(numfmt --to=iec-i --suffix=B $WEBGL2_THRESHOLD) by more than 10%"
            FAILED=1
          fi

          WEBGPU_LIMIT=$((WEBGPU_THRESHOLD * 110 / 100))
          if [ "$WEBGPU_SIZE" -gt "$WEBGPU_LIMIT" ]; then
            echo "::error::WebGPU WASM binary too large: $(numfmt --to=iec-i --suffix=B $WEBGPU_SIZE) exceeds threshold $(numfmt --to=iec-i --suffix=B $WEBGPU_THRESHOLD) by more than 10%"
            FAILED=1
          fi

          exit $FAILED

  command-parity:
    name: MCP Command Parity
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.mcp == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Verify all MCP commands have handlers
        working-directory: web
        run: node scripts/check-command-parity.js

  build-nextjs:
    name: Next.js Production Build
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - run: npm run build
        working-directory: web

      - name: Check JS bundle size
        working-directory: web
        run: node scripts/check-bundle-size.js

  # Engine-dependent E2E tests (@engine) require WASM + GPU which CI runners lack.
  # Only UI-only E2E tests (@ui) run in CI -- they test React shell without WASM.
  test-e2e-ui:
    name: E2E UI Tests
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.engine == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run UI-only E2E tests
        working-directory: web
        run: npx playwright test --grep @ui --project=chromium

  security:
    name: Rust Security Audit
    needs: changes
    if: needs.changes.outputs.engine == 'true' || needs.changes.outputs.web == 'true' || needs.changes.outputs.mcp == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - name: npm audit (web)
        working-directory: web
        run: npm audit --audit-level=high

      - run: npm ci
        working-directory: mcp-server

      - name: npm audit (mcp-server)
        working-directory: mcp-server
        run: npm audit --audit-level=high

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Rust dependency audit
        working-directory: engine
        run: cargo audit
