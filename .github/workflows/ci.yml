name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: --cfg=web_sys_unstable_apis

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - run: npx eslint --max-warnings 0
        working-directory: web

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - run: npx tsc --noEmit
        working-directory: web

  test-web:
    name: Web Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - name: Run tests
        working-directory: web
        # timeout: vitest hangs after tests pass due to open handles in forked pool.
        # 10-minute timeout lets all tests run, then kills the hung process.
        # Exit code 124 = timeout (tests passed but process didn't exit).
        run: |
          set +e
          timeout 600 npx vitest run
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 124 ]; then
            echo "::warning::vitest process hung after tests completed — killed by timeout (known vitest fork-pool issue)"
            exit 0
          fi
          exit $EXIT_CODE

  test-mcp:
    name: MCP Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - run: npm ci
        working-directory: mcp-server

      - run: npx vitest run
        working-directory: mcp-server

  build-wasm:
    name: WASM Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine -> target

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.108

      - name: Build WebGL2
        working-directory: engine
        run: cargo build --target wasm32-unknown-unknown --release --features webgl2

      - name: Build WebGPU
        working-directory: engine
        run: cargo build --target wasm32-unknown-unknown --release --features webgpu

      - name: Run wasm-bindgen (WebGL2)
        working-directory: engine
        run: wasm-bindgen --target web --out-dir pkg-webgl2 target/wasm32-unknown-unknown/release/forge_engine.wasm

      - name: Run wasm-bindgen (WebGPU)
        working-directory: engine
        run: wasm-bindgen --target web --out-dir pkg-webgpu target/wasm32-unknown-unknown/release/forge_engine.wasm

      - name: Check WASM binary sizes
        working-directory: engine
        run: |
          # Size thresholds in bytes (uncompressed .wasm after wasm-bindgen)
          # Current sizes: ~47 MB each. Increase when intentionally adding features.
          # CI fails if size exceeds threshold by more than 10%.
          WEBGL2_THRESHOLD=52428800   # 50 MB
          WEBGPU_THRESHOLD=52428800   # 50 MB

          WEBGL2_SIZE=$(stat -c%s pkg-webgl2/forge_engine_bg.wasm)
          WEBGPU_SIZE=$(stat -c%s pkg-webgpu/forge_engine_bg.wasm)

          echo "=== WASM Binary Sizes ==="
          echo "WebGL2: $(numfmt --to=iec-i --suffix=B $WEBGL2_SIZE) ($WEBGL2_SIZE bytes)"
          echo "WebGPU: $(numfmt --to=iec-i --suffix=B $WEBGPU_SIZE) ($WEBGPU_SIZE bytes)"
          echo "========================="

          FAILED=0

          WEBGL2_LIMIT=$((WEBGL2_THRESHOLD * 110 / 100))
          if [ "$WEBGL2_SIZE" -gt "$WEBGL2_LIMIT" ]; then
            echo "::error::WebGL2 WASM binary too large: $(numfmt --to=iec-i --suffix=B $WEBGL2_SIZE) exceeds threshold $(numfmt --to=iec-i --suffix=B $WEBGL2_THRESHOLD) by more than 10%"
            FAILED=1
          fi

          WEBGPU_LIMIT=$((WEBGPU_THRESHOLD * 110 / 100))
          if [ "$WEBGPU_SIZE" -gt "$WEBGPU_LIMIT" ]; then
            echo "::error::WebGPU WASM binary too large: $(numfmt --to=iec-i --suffix=B $WEBGPU_SIZE) exceeds threshold $(numfmt --to=iec-i --suffix=B $WEBGPU_THRESHOLD) by more than 10%"
            FAILED=1
          fi

          exit $FAILED

  build-nextjs:
    name: Next.js Production Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - run: npm run build
        working-directory: web

  # Engine-dependent E2E tests (@engine) require WASM + GPU which CI runners lack.
  # Only UI-only E2E tests (@ui) run in CI — they test React shell without WASM.
  test-e2e-ui:
    name: E2E UI Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run UI-only E2E tests
        working-directory: web
        run: npx playwright test --grep @ui --project=chromium

  security:
    name: Rust Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - name: npm audit (web)
        working-directory: web
        run: npm audit --audit-level=high

      - run: npm ci
        working-directory: mcp-server

      - name: npm audit (mcp-server)
        working-directory: mcp-server
        run: npm audit --audit-level=high

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Rust dependency audit
        working-directory: engine
        run: cargo audit
