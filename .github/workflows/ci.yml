name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Restrict default token permissions (CWE-732 / CodeQL workflow-missing-permissions).
# Individual jobs add specific permissions only when needed.
permissions:
  contents: read

jobs:
  # ---- CI Gate ----
  # Always runs on every PR. Detects which paths changed and sets outputs
  # so downstream jobs can skip when not needed. The ruleset requires only
  # this check — it always posts a result, solving the path-filter + required-checks conflict.
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      needs-web: ${{ steps.changes.outputs.web }}
      needs-engine: ${{ steps.changes.outputs.engine }}
      needs-mcp: ${{ steps.changes.outputs.mcp }}
      needs-ci: ${{ steps.changes.outputs.ci }}
      needs-any-code: ${{ steps.changes.outputs.any-code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")

          web=false; engine=false; mcp=false; ci=false

          echo "$CHANGED" | grep -q '^web/' && web=true
          echo "$CHANGED" | grep -q '^engine/' && engine=true
          echo "$CHANGED" | grep -q '^mcp-server/' && mcp=true
          echo "$CHANGED" | grep -qE '^\.github/workflows/|^scripts/|^package\.json|^package-lock\.json|^\.claude/skills/.*/scripts/' && ci=true

          any_code=false
          if [ "$web" = "true" ] || [ "$engine" = "true" ] || [ "$mcp" = "true" ] || [ "$ci" = "true" ]; then
            any_code=true
          fi

          echo "web=$web" >> "$GITHUB_OUTPUT"
          echo "engine=$engine" >> "$GITHUB_OUTPUT"
          echo "mcp=$mcp" >> "$GITHUB_OUTPUT"
          echo "ci=$ci" >> "$GITHUB_OUTPUT"
          echo "any-code=$any_code" >> "$GITHUB_OUTPUT"

          echo "Changed paths detected:"
          echo "  web=$web engine=$engine mcp=$mcp ci=$ci any-code=$any_code"
          if [ "$any_code" = "false" ]; then
            echo "No code changes — downstream jobs will be skipped"
          fi

  # ---- Quality Gates (reusable workflow shared with CD) ----
  quality-gates:
    name: Quality Gates
    needs: [ci-gate]
    if: ${{ needs.ci-gate.outputs.needs-any-code == 'true' }}
    uses: ./.github/workflows/quality-gates.yml
    with:
      web-changed: ${{ fromJSON(needs.ci-gate.outputs.needs-web) }}
      engine-changed: ${{ fromJSON(needs.ci-gate.outputs.needs-engine) }}
      mcp-changed: ${{ fromJSON(needs.ci-gate.outputs.needs-mcp) }}
      ci-changed: ${{ fromJSON(needs.ci-gate.outputs.needs-ci) }}
      # PRs never run on main — the ratchet commit step is guarded by
      # github.ref == refs/heads/main so it is a no-op here, but false
      # makes the intent explicit.
      can-commit-ratchet: false

  # ---- CI-only checks ----

  command-parity:
    name: MCP Command Parity
    needs: [ci-gate]
    if: ${{ needs.ci-gate.outputs.needs-web == 'true' || needs.ci-gate.outputs.needs-mcp == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Verify all MCP commands have handlers
        working-directory: web
        run: node scripts/check-command-parity.js

  build-nextjs:
    name: Next.js Production Build
    needs: [ci-gate]
    if: ${{ needs.ci-gate.outputs.needs-web == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - run: npm run build
        working-directory: web

      - name: Check JS bundle size
        working-directory: web
        run: node scripts/check-bundle-size.js

  # ---- Preview Deployment (PR only) ----
  # Deploys a Vercel preview for every PR so reviewers can test changes without
  # a local build. Only runs when VERCEL_DEPLOY_ENABLED is set and web/mcp files changed.
  preview-deploy:
    name: Preview Deployment
    needs: [ci-gate]
    if: |
      vars.VERCEL_DEPLOY_ENABLED == 'true' &&
      (needs.ci-gate.outputs.needs-web == 'true' || needs.ci-gate.outputs.needs-mcp == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Pull Vercel environment (preview)
        working-directory: web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_STAGING_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Deploy preview
        id: deploy
        working-directory: web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_STAGING_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Deploy directly instead of build+deploy-prebuilt.
          # vercel build uses child_process.spawn('npm') which fails on GHA
          # runners because setup-node's PATH isn't inherited by spawned
          # processes. vercel deploy builds remotely on Vercel infrastructure
          # where npm is always available.
          url=$(vercel deploy --token="$VERCEL_TOKEN")
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Preview deployment: $url" >> "$GITHUB_STEP_SUMMARY"

      - name: Comment preview URL on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          short_sha="${COMMIT_SHA:0:8}"
          gh pr comment "$PR_NUMBER" \
            --body "**Preview deployment ready** — [\`${short_sha}\`](${DEPLOY_URL}): ${DEPLOY_URL}" \
            --repo "$REPO"

  # Engine-dependent E2E tests (@engine) require WASM + GPU which CI runners lack.
  # Only UI-only E2E tests (@ui) run in CI — they test React shell without WASM.
  test-e2e-ui:
    name: E2E UI Tests
    needs: [ci-gate]
    if: ${{ needs.ci-gate.outputs.needs-web == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run UI-only E2E tests
        working-directory: web
        run: npx playwright test --grep @ui --project=chromium

