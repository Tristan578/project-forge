name: Doc Freshness Check

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  doc-freshness:
    name: Check Docs Against Changed Source Files
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run doc freshness validation and capture output
        id: freshness
        run: |
          chmod +x .claude/tools/validate-docs-freshness.sh
          # Run once, capture output for both the job result and the step summary.
          # Use a heredoc-style delimiter to safely store multi-line output as a
          # GitHub Actions output variable — avoids double-execution of the script.
          OUTPUT=$(bash .claude/tools/validate-docs-freshness.sh 2>&1 || true)
          echo "$OUTPUT"
          {
            echo "output<<FRESHNESS_EOF"
            echo "$OUTPUT"
            echo "FRESHNESS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Write job summary
        if: always()
        env:
          FRESHNESS_OUTPUT: ${{ steps.freshness.outputs.output }}
        run: |
          echo "## Doc Freshness Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Checking docs/features/ files whose relatedFiles frontmatter" >> "$GITHUB_STEP_SUMMARY"
          echo "references source files changed in this push." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$FRESHNESS_OUTPUT" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          if echo "$FRESHNESS_OUTPUT" | grep -q "DOC UPDATE NEEDED"; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> **Note:** One or more docs may be stale. This check is non-blocking." >> "$GITHUB_STEP_SUMMARY"
            echo "> Update the relevant docs/features/ files and bump their lastVerified date." >> "$GITHUB_STEP_SUMMARY"
          fi
